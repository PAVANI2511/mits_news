version: '3.8'

services:
  db:
    image: mongo:latest
    container_name: mits_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: mits_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://db:27017
      - MONGO_DB_NAME=mits_newspaper
      - DEBUG=True
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: mits_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
